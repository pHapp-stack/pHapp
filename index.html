<script type="text/babel">

};

const OPENMETEO_W = "https://open-meteo.com/en/docs";
const OPENMETEO_M = "https://open-meteo.com/en/docs/marine-weather-api";

function tidePageUrl(loc, date) {
  const months = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
  return `https://www.tidetime.org/australia-pacific/australia/${loc.tideSlug}-calendar-${months[date.getMonth()]}.htm`;
}

function getMoonPhase(date) {
  const diff  = (date - new Date(2000,0,6.3)) / 86400000;
  const phase = ((diff % 29.53058867) + 29.53058867) % 29.53058867;
  if (phase < 1.85)  return { name:"New Moon",        symbol:"🌑" };
  if (phase < 7.38)  return { name:"Waxing Crescent",  symbol:"🌒" };
  if (phase < 9.22)  return { name:"First Quarter",    symbol:"🌓" };
  if (phase < 14.77) return { name:"Waxing Gibbous",   symbol:"🌔" };
  if (phase < 16.61) return { name:"Full Moon",        symbol:"🌕" };
  if (phase < 22.15) return { name:"Waning Gibbous",   symbol:"🌖" };
  if (phase < 23.99) return { name:"Last Quarter",     symbol:"🌗" };
  return               { name:"Waning Crescent",  symbol:"🌘" };
}

function degToCompass(deg) {
  if (deg == null) return "—";
  return ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"][Math.round(deg/22.5)%16];
}

function addDays(date, n) {
  const d = new Date(date); d.setDate(d.getDate()+n); return d;
}

function getSaturday() {
  const today = new Date();
  const diff = today.getDay() === 6 ? 7 : (6 - today.getDay() + 7) % 7 || 7;
  const sat = new Date(today); sat.setDate(today.getDate()+diff);
  return sat;
}

function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function parseTideTime(timeStr, refDate) {
  const clean = timeStr.replace(/ /g, " ").trim();
  const m = clean.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (!m) return null;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  const ampm = m[3].toUpperCase();
  if (ampm === "PM" && h !== 12) h += 12;
  if (ampm === "AM" && h === 12) h = 0;
  const d = new Date(refDate); d.setHours(h, min, 0, 0);
  return d;
}

function hourlyForDay(hourly, key, field) {
  if (!hourly?.time) return [];
  return hourly.time.map((t,i) => t.startsWith(key) ? hourly[field]?.[i] : null).filter(v => v != null && !isNaN(v));
}

async function scrapeTides(loc, date) {
  const url = tidePageUrl(loc, date);
  const proxies = [
    async () => {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, {signal:AbortSignal.timeout(12000)});
      if (!r.ok) throw new Error(`allorigins ${r.status}`);
      const j = await r.json();
      if (!j.contents) throw new Error("empty");
      return j.contents;
    },
    async () => {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {signal:AbortSignal.timeout(12000)});
      if (!r.ok) throw new Error(`corsproxy ${r.status}`);
      return await r.text();
    },
  ];

  let html = null;
  for (const p of proxies) { try { html = await p(); break; } catch(e) {} }
  if (!html) throw new Error("Proxy failed — retry");

  const doc = new DOMParser().parseFromString(html, "text/html");
  const rows = [...doc.querySelectorAll("table tr")];
  const target = `${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][date.getDay()]} ${String(date.getDate()).padStart(2,"0")}`.toLowerCase();

  let colTypes = ["high","low","high","low","high"];
  for (const row of rows) {
    const ths = [...row.querySelectorAll("th")];
    if (ths.length >= 3) {
      colTypes = ths.slice(1,6).map(th =>
        th.textContent.toLowerCase().includes("high") ? "high" :
        th.textContent.toLowerCase().includes("low")  ? "low"  : null
      );
      break;
    }
  }

  const re = /(\d{1,2}:\d{2}\s*[AP]M)\s*(?:AEDT|AEST)\s*([\d.]+)\s*m/i;
  for (const row of rows) {
    const cells = [...row.querySelectorAll("td")];
    if (!cells.length || !cells[0].textContent.trim().toLowerCase().startsWith(target)) continue;
    const tides = [];
    cells.slice(1,6).forEach((cell,i) => {
      const m = cell.textContent.trim().match(re);
      if (m) tides.push({time:m[1].replace(/\s+/,"\u00a0"), height:parseFloat(m[2]), type:colTypes[i]??(i%2===0?"high":"low")});
    });
    if (tides.length) return tides;
    break;
  }
  throw new Error("No tides parsed — check slug");
}

// ---- UI Components ----

function SectionLabel({ children, links }) {
  return (
    <div style={{display:"flex",alignItems:"baseline",flexWrap:"wrap",marginBottom:"6px",gap:"0"}}>
      <span style={{fontSize:"0.65rem",color:"#7a9ab4",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:"700",marginRight:"12px"}}>{children}</span>
      {links?.map((l,i) => (
        <span key={i} style={{marginRight:"10px"}}>
          <a className="src-lnk" href={l.href} target="_blank" rel="noopener noreferrer">{l.label}</a>
        </span>
      ))}
    </div>
  );
}

function Divider() {
  return <div style={{borderTop:"1px solid #1a2840",margin:"6px 0"}} />;
}

// unit rendered inline next to value
function DataCell({ label, value, unit, src }) {
  const inner = (
    <span style={{display:"inline-flex",alignItems:"baseline",gap:"4px",justifyContent:"center"}}>
      <span style={{fontSize:"1.65rem",fontWeight:"700",color:"#d4dce8",lineHeight:1}}>{value ?? "—"}</span>
      {unit && <span style={{fontSize:"0.58rem",color:"#3a5060"}}>{unit}</span>}
    </span>
  );
  return (
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:"0.58rem",color:"#3a5568",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"4px"}}>{label}</div>
      {src
        ? <a className="src-val" href={src} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>{inner}</a>
        : inner
      }
    </div>
  );
}

function WindArrow({ deg }) {
  if (deg == null) return null;
  return <span style={{display:"inline-block",transform:`rotate(${deg}deg)`,marginLeft:"3px",fontSize:"1.2rem"}}>↑</span>;
}

function TideBar({ tides, loading, error, tideSrcUrl }) {
  if (loading) return <div style={{color:"#2a4a6a",fontSize:"0.8rem"}}>Fetching tides…</div>;
  if (error)   return <div style={{color:"#8a3030",fontSize:"0.73rem"}}>⚠ {error}</div>;
  if (!tides?.length) return <div style={{color:"#4a5568",fontSize:"0.8rem"}}>No data</div>;
  const max = Math.max(...tides.map(t=>t.height));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
      {tides.map((t,i) => (
        <div key={i} style={{display:"grid",gridTemplateColumns:"14px 68px 1fr 50px",alignItems:"center",gap:"8px"}}>
          <span style={{color:t.type==="high"?"#e8a020":"#5a8fa3",fontSize:"0.62rem",textAlign:"center"}}>{t.type==="high"?"▲":"▼"}</span>
          <span style={{fontSize:"0.85rem",color:"#8090a4",whiteSpace:"nowrap"}}>{t.time}</span>
          <div style={{background:"#0a1020",borderRadius:"2px",height:"5px"}}>
            <div style={{width:`${(t.height/max)*100}%`,height:"100%",background:t.type==="high"?"#e8a020":"#2a5a72",borderRadius:"2px"}} />
          </div>
          <a className="src-val" href={tideSrcUrl} target="_blank" rel="noopener noreferrer"
            style={{fontSize:"1.05rem",fontWeight:"700",color:t.type==="high"?"#e8a020":"#5a8fa3",textAlign:"right",display:"block"}}>
            {t.height.toFixed(2)}m
          </a>
        </div>
      ))}
    </div>
  );
}

function DayCard({ date, loc, weather, weatherError, marine, marineError, tidesLoading, tides, tidesError }) {
  const key = fmt(date);
  const moonPhase = getMoonPhase(date);
  const tideSrcUrl = tidePageUrl(loc, date);

  let windDir=null, rain=null, waveHeight=null, swellHeight=null, swellDir=null;
  if (weather?.daily) {
    const idx = weather.daily.time.indexOf(key);
    if (idx !== -1) { windDir=weather.daily.wind_direction_10m_dominant?.[idx]; rain=weather.daily.precipitation_sum?.[idx]; }
  }
  if (marine?.daily) {
    const idx = marine.daily.time.indexOf(key);
    if (idx !== -1) { waveHeight=marine.daily.wave_height_max?.[idx]; swellHeight=marine.daily.swell_wave_height_max?.[idx]; swellDir=marine.daily.swell_wave_direction_dominant?.[idx]; }
  }

  const windVals     = hourlyForDay(weather?.hourly, key, "wind_speed_10m");
  const pressureVals = hourlyForDay(weather?.hourly, key, "pressure_msl");
  const sstVals      = hourlyForDay(marine?.hourly,  key, "sea_surface_temperature");

  const windMin  = windVals.length     ? Math.round(Math.min(...windVals))                                  : null;
  const windMax  = windVals.length     ? Math.round(Math.max(...windVals))                                  : null;
  const pressure = pressureVals.length ? Math.round(pressureVals.reduce((a,b)=>a+b,0)/pressureVals.length) : null;
  const sst      = sstVals.length      ? (sstVals.reduce((a,b)=>a+b,0)/sstVals.length).toFixed(1)          : null;

  const windColor  = windMax == null ? "#d4dce8" : windMax < 15  ? "#3a8050" : windMax > 20  ? "#d05050" : "#d4dce8";
  const rainColor  = rain    == null ? "#d4dce8" : rain    < 1   ? "#3a8050" : rain    > 5   ? "#d05050" : "#d4dce8";
  const seaColor   = waveHeight  == null ? "#d4dce8" : waveHeight  <= 1 ? "#3a8050" : waveHeight  > 1.5 ? "#d05050" : "#d4dce8";
  const swellColor = swellHeight == null ? "#d4dce8" : swellHeight <= 1 ? "#3a8050" : swellHeight > 1.5 ? "#d05050" : "#d4dce8";

  return (
    <div style={{background:"linear-gradient(160deg,#0d1525 0%,#070e1a 100%)",border:"1px solid #192840",borderRadius:"4px",padding:"14px",paddingBottom:"18px",height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      <div style={{flexShrink:0}}>
        <SectionLabel links={[{href:tideSrcUrl,label:"Tidetime"}]}>Tides</SectionLabel>
        <TideBar tides={tides} loading={tidesLoading} error={tidesError} tideSrcUrl={tideSrcUrl} />
      </div>

      <div style={{flexShrink:0}}>
        <Divider />
        <SectionLabel links={[{href:loc.bomWind,label:"BOM"}]}>Wind</SectionLabel>
        {weatherError
          ? <div style={{fontSize:"0.73rem",color:"#8a3030"}}>⚠ {weatherError}</div>
          : <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
              <DataCell label="Range" src={OPENMETEO_W} value={windMin!=null?<span style={{color:windColor}}>{windMin}–{windMax}</span>:"—"} unit="km/h" />
              <DataCell label="Dir"   src={OPENMETEO_W} value={<span style={{display:"inline-flex",alignItems:"center"}}>{degToCompass(windDir)}<WindArrow deg={windDir}/></span>} />
              <DataCell label="Rain"  src={OPENMETEO_W} value={<span style={{color:rainColor}}>{rain!=null?rain.toFixed(1):"—"}</span>} unit="mm" />
            </div>
        }
      </div>

      <div style={{flexShrink:0}}>
        <Divider />
        <SectionLabel links={[
          {href:"https://www.bom.gov.au/nsw/forecasts/sydneycoast.shtml",label:"BOM"},
          {href:"https://www.seabreeze.com.au/weather/wind-forecast/sydney",label:"Seabreeze"},
        ]}>Offshore</SectionLabel>
        {marineError
          ? <div style={{fontSize:"0.73rem",color:"#8a3030"}}>⚠ {marineError}</div>
          : <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
              <DataCell label="Sea"   src={OPENMETEO_M} value={waveHeight!=null?<span style={{color:seaColor}}>{waveHeight.toFixed(1)}</span>:"—"} unit="m" />
              <DataCell label="Swell" src={OPENMETEO_M} value={swellHeight!=null?<span style={{color:swellColor}}>{swellHeight.toFixed(1)}</span>:"—"} unit="m" />
              <DataCell label="Dir"   src={OPENMETEO_M} value={degToCompass(swellDir)} />
            </div>
        }
      </div>

      <div style={{flexShrink:0}}>
        <Divider />
        <SectionLabel links={[
          {href:"https://www.bom.gov.au/oceanography/forecasts/idyoc300.shtml?region=NSW&forecast=SST",label:"Currents"},
        ]}>Vibes</SectionLabel>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
          <DataCell label="Water"    src={OPENMETEO_M} value={sst??"—"} unit="°C" />
          <DataCell label="Pressure" src={OPENMETEO_W} value={pressure??"—"} unit="hPa" />
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"0.58rem",color:"#3a5568",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"4px"}}>Moon</div>
            <div style={{display:"inline-flex",alignItems:"baseline",gap:"5px"}}>
              <span style={{fontSize:"1.65rem",lineHeight:1}}>{moonPhase.symbol}</span>
              <span style={{fontSize:"0.58rem",color:"#3a5060"}}>{moonPhase.name}</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{flex:1,minHeight:"10px"}} />
    </div>
  );
}

// ---- App ----

function App() {
  const [locKey, setLocKey]             = React.useState("ph");
  const [weather, setWeather]           = React.useState({});
  const [weatherError, setWeatherError] = React.useState({});
  const [marine, setMarine]             = React.useState({});
  const [marineError, setMarineError]   = React.useState({});
  const [tideData, setTideData]         = React.useState({});
  const [tideErrors, setTideErrors]     = React.useState({});
  const [tidesLoading, setTidesLoading] = React.useState(true);
  const [loading, setLoading]           = React.useState(true);
  const [updatedAt, setUpdatedAt]       = React.useState(null);
  const [windowStart, setWindowStart]   = React.useState(() => getSaturday());
  const [activeIdx, setActiveIdx]       = React.useState(0);
  const [tripActive, setTripActive]     = React.useState(false);
  const [tripStart, setTripStart]       = React.useState(null);
  const [tripElapsed, setTripElapsed]   = React.useState(0);
  const [showTrip, setShowTrip]         = React.useState(false);
  const [catches, setCatches]           = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("ph_catches") || "[]"); } catch(e) { return []; }
  });
  const [currentTrip, setCurrentTrip]   = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("ph_current_trip") || "null"); } catch(e) { return null; }
  });

  React.useEffect(() => {
    if (!tripActive) return;
    const id = setInterval(() => setTripElapsed(Math.floor((Date.now() - tripStart) / 1000)), 1000);
    return () => clearInterval(id);
  }, [tripActive, tripStart]);

  function toggleTrip() {
    if (tripActive) {
      if (!window.confirm("End trip?")) return;
      if (catches.filter(c => c.tripId === currentTrip?.id).length > 0) {
        if (window.confirm("Export catch log before ending?")) exportCSV();
      }
      setTripActive(false);
      setTripStart(null);
      setTripElapsed(0);
      localStorage.removeItem("ph_current_trip");
    } else {
      // Start trip
      const _now = new Date(); const _dd = String(_now.getDate()).padStart(2,'0'); const _mm = String(_now.getMonth()+1).padStart(2,'0'); const _yyyy = _now.getFullYear(); const trip = { id: `${_dd}${_mm}${_yyyy}`, startTime: _now.toISOString(), location: loc.short };
      setTripActive(true);
      setTripStart(Date.now());
      setTripElapsed(0);
      setCurrentTrip(trip);
      setShowTrip(true);
      localStorage.setItem("ph_current_trip", JSON.stringify(trip));
    }
  }

  const [idState, setIdState]           = React.useState(null); // null | "capturing" | "identifying" | "confirm" | "error"
  const [idPhoto, setIdPhoto]           = React.useState(null); // base64
  const [idResult, setIdResult]         = React.useState(null); // {species, length_cm, confidence, notes}
  const [idSpecies, setIdSpecies]       = React.useState("");
  const [idLength, setIdLength]         = React.useState("");
  const [idError, setIdError]           = React.useState("");
  const fileInputRef = React.useRef();

  function openCamera() {
    fileInputRef.current.click();
  }

  async function handlePhoto(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = ""; // reset so same photo can be re-selected

    // Read via FileReader (handles HEIC, avoids createObjectURL issues on iOS)
    const dataUrl = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.onerror = () => rej(new Error("File read failed — try a different photo"));
      reader.readAsDataURL(file);
    });

    // Resize via canvas; fall back to raw base64 if canvas fails (e.g. HEIC)
    const base64 = await new Promise((res) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        try {
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          res(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
        } catch(_) { res(dataUrl.split(",")[1]); }
      };
      img.onerror = () => res(dataUrl.split(",")[1]);
      img.src = dataUrl;
    });

    setIdPhoto(base64);
    setIdSpecies("");
    setIdLength("");
    setIdState("confirm");
  }

  function getCoords() {
    return new Promise(resolve => {
      if (!navigator.geolocation) return resolve(null);
      const timer = setTimeout(() => resolve(null), 5000);
      navigator.geolocation.getCurrentPosition(
        pos => { clearTimeout(timer); resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
        ()  => { clearTimeout(timer); resolve(null); },
        { timeout: 5000, maximumAge: 30000 }
      );
    });
  }

  function getConditions() {
    const now = new Date();
    const hourKey = `${fmt(now)}T${String(now.getHours()).padStart(2,"0")}:00`;

    // Hourly weather
    const wh = weather[locKey]?.hourly;
    const wIdx = wh?.time?.indexOf(hourKey) ?? -1;
    const pressure  = wIdx >= 0 && wh.pressure_msl?.[wIdx]   != null ? Math.round(wh.pressure_msl[wIdx])   : null;
    const windSpeed = wIdx >= 0 && wh.wind_speed_10m?.[wIdx]  != null ? Math.round(wh.wind_speed_10m[wIdx]) : null;

    // Daily wind direction (only daily data available)
    const wd = weather[locKey]?.daily;
    const wdIdx = wd?.time?.indexOf(fmt(now)) ?? -1;
    const windDir = wdIdx >= 0 ? degToCompass(wd.wind_direction_10m_dominant?.[wdIdx] ?? null) : null;

    // Hourly sea surface temp
    const mh = marine[locKey]?.hourly;
    const mIdx = mh?.time?.indexOf(hourKey) ?? -1;
    const waterTemp = mIdx >= 0 && mh.sea_surface_temperature?.[mIdx] != null
      ? parseFloat(mh.sea_surface_temperature[mIdx].toFixed(1)) : null;

    // Interpolated tide height (cosine between bracketing events)
    let tideHeight = null;
    const todayTides = tideData[`${locKey}::${fmt(now)}`] || [];
    if (todayTides.length >= 2) {
      const withDt = todayTides
        .map(t => ({...t, dt: parseTideTime(t.time, now)}))
        .filter(t => t.dt)
        .sort((a,b) => a.dt - b.dt);
      const prev = [...withDt].reverse().find(t => t.dt <= now);
      const next = withDt.find(t => t.dt > now);
      if (prev && next) {
        const ratio = (now - prev.dt) / (next.dt - prev.dt);
        tideHeight = parseFloat((prev.height + (next.height - prev.height) * (1 - Math.cos(Math.PI * ratio)) / 2).toFixed(2));
      }
    }

    return { pressure, windSpeed, windDir, waterTemp, tideHeight };
  }

  async function confirmCatch() {
    const coords = await getCoords();
    const cond  = getConditions();
    const entry = {
      id: Date.now(),
      time: new Date().toISOString(),
      species: idSpecies.trim() || "Unknown",
      length: idLength ? parseInt(idLength) : null,
      photo: `data:image/jpeg;base64,${idPhoto}`,
      confidence: idResult?.confidence ?? null,
      notes: idResult?.notes ?? null,
      loc: loc.short,
      tripId: currentTrip?.id ?? null,
      lat: coords?.lat ?? null,
      lng: coords?.lng ?? null,
      conditions: {
        pressure:   cond.pressure,
        waterTemp:  cond.waterTemp,
        windSpeed:  cond.windSpeed,
        windDir:    cond.windDir,
        tideHeight: cond.tideHeight,
      }
    };
    const updated = [entry, ...catches];
    setCatches(updated);
    localStorage.setItem("ph_catches", JSON.stringify(updated));
    setIdState(null);
    setIdPhoto(null);
    setIdResult(null);
    setShowTrip(true);
  }

  function cancelID() {
    setIdState(null);
    setIdPhoto(null);
    setIdResult(null);
  }

  function clearTrip() {
    if (!window.confirm("Clear all catches from this trip?")) return;
    const remaining = catches.filter(c => c.tripId !== currentTrip?.id);
    setCatches(remaining);
    localStorage.setItem("ph_catches", JSON.stringify(remaining));
  }

  function exportCSV() {
    const rows = [["Time","Species","Length (cm)","Location","Trip ID","Lat","Lng","Pressure (hPa)","Water Temp (C)","Wind (km/h)","Wind Dir","Tide Height (m)"]];
    catches.forEach(c => {
      const cd = c.conditions || {};
      rows.push([
        c.time, c.species, c.length ?? "", c.loc, c.tripId ?? "",
        c.lat ?? "", c.lng ?? "",
        cd.pressure ?? "", cd.waterTemp ?? "", cd.windSpeed ?? "", cd.windDir ?? "", cd.tideHeight ?? ""
      ]);
    });
    const csv = rows.map(r => r.join(",")).join("\n");
    const a = document.createElement("a");
    a.href = "data:text/csv," + encodeURIComponent(csv);
    a.download = "catches.csv";
    a.click();
  }

  function fmtElapsed(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    return h > 0
      ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`
      : `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString("en-AU", {hour:"2-digit", minute:"2-digit"});
  }

  const loc  = LOCATIONS[locKey];
  const dayA = windowStart;
  const dayB = addDays(windowStart, 1);
  const date = activeIdx === 0 ? dayA : dayB;

  React.useEffect(() => {
    if (weather[locKey]) return; // already fetched
    setLoading(true);
    const {lat, lng} = loc;

    async function fetchW() {
      try {
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
          `&daily=wind_direction_10m_dominant,precipitation_sum` +
          `&hourly=wind_speed_10m,pressure_msl` +
          `&timezone=Australia/Sydney&forecast_days=16`,
          {signal:AbortSignal.timeout(10000)}
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        setWeather(w => ({...w, [locKey]: data}));
      } catch(e) { setWeatherError(err => ({...err, [locKey]: e.message})); }
    }

    async function fetchM() {
      try {
        const res = await fetch(
          `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lng}` +
          `&daily=wave_height_max,swell_wave_height_max,swell_wave_direction_dominant` +
          `&hourly=sea_surface_temperature` +
          `&timezone=Australia/Sydney&forecast_days=16`,
          {signal:AbortSignal.timeout(10000)}
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        setMarine(m => ({...m, [locKey]: data}));
      } catch(e) { setMarineError(err => ({...err, [locKey]: e.message})); }
    }

    Promise.all([fetchW(), fetchM()]).finally(() => {
      setLoading(false);
      setUpdatedAt(new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"}));
    });
  }, [locKey]);

  React.useEffect(() => {
    const days = [dayA, dayB];
    setTidesLoading(true);
    const newData = {...tideData}, newErrors = {...tideErrors};
    Promise.all(days.map(async d => {
      const ck = `${locKey}::${fmt(d)}`;
      if (newData[ck]) return;
      try   { newData[ck] = await scrapeTides(loc, d); delete newErrors[ck]; }
      catch(e) { newErrors[ck] = e.message; }
    })).finally(() => {
      setTideData({...newData});
      setTideErrors({...newErrors});
      setTidesLoading(false);
    });
  }, [locKey, fmt(windowStart)]);

  const cacheKey = `${locKey}::${fmt(date)}`;
  const btnBase  = {padding:"6px 0",borderRadius:"3px",border:"1px solid",fontSize:"0.72rem",fontWeight:"700"};
  const tripCatches = catches.filter(c => c.tripId === currentTrip?.id);

  // Trip log panel
  const TripPanel = () => (
    <div style={{
      position:"absolute", inset:0,
      background:"#060c18",
      display:"flex", flexDirection:"column",
      padding:"14px 12px 12px",
      transform: showTrip ? "translateX(0)" : "translateX(100%)",
      transition:"transform 0.25s ease",
      zIndex:10,
    }}>
      {/* Trip header */}
      <div style={{flexShrink:0, paddingTop:"6px", paddingBottom:"14px"}}>
        <div style={{fontSize:"0.53rem",color:"#1a3050",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>◈ Trip Log</span>
          <button onClick={()=>setShowTrip(false)} style={{background:"none",border:"none",color:"#2a4060",fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",padding:0}}>← Dashboard</button>
        </div>
        <div style={{fontSize:"1.35rem",fontWeight:"700",color:"#e8a020",letterSpacing:"-0.03em",lineHeight:1}}>{loc.short}</div>
        {currentTrip && (
          <div style={{fontSize:"0.7rem",color:"#2a4a6a",marginTop:"4px"}}>
            Departed {fmtTime(currentTrip.startTime)}
            {tripActive && <span style={{marginLeft:"10px",color:"#8a7040"}}>{fmtElapsed(tripElapsed)}</span>}
          </div>
        )}
        {(() => {
          const todayTides = tideData[`${locKey}::${fmt(new Date())}`] || [];
          const now = new Date();
          const next = todayTides
            .map(t => ({...t, dt: parseTideTime(t.time, now)}))
            .filter(t => t.dt && t.dt > now)
            .sort((a,b) => a.dt - b.dt)[0];
          if (!next) return null;
          const mins = Math.round((next.dt - now) / 60000);
          const isHigh = next.type === "high";
          return (
            <div style={{marginTop:"14px",lineHeight:1}}>
              <span style={{fontSize:"2.6rem",fontWeight:"700",color:isHigh?"#e8a020":"#5a8fa3",letterSpacing:"-0.03em"}}>{mins}</span>
              <span style={{fontSize:"0.7rem",color:isHigh?"#8a6020":"#3a6a80",marginLeft:"8px"}}>min to {next.type.toUpperCase()} {isHigh?"▲":"▼"}</span>
            </div>
          );
        })()}
      </div>

      {/* Catch list */}
      <div style={{flex:1,overflowY:"auto",minHeight:0}}>
        {tripCatches.length === 0
          ? <div style={{fontSize:"0.75rem",color:"#1a3050",paddingTop:"8px"}}>No catches logged yet.</div>
          : tripCatches.map(c => (
            <div key={c.id} style={{
              display:"grid", gridTemplateColumns:"44px 1fr 52px 44px",
              gap:"10px", alignItems:"center",
              borderBottom:"1px solid #0d1828", paddingBottom:"10px", marginBottom:"10px",
            }}>
              {/* Time */}
              <div style={{fontSize:"0.7rem",color:"#2a4a6a",whiteSpace:"nowrap"}}>{fmtTime(c.time)}</div>
              {/* Species */}
              <div style={{fontSize:"0.95rem",fontWeight:"700",color:"#d4dce8"}}>{c.species}</div>
              {/* Length */}
              <div>
                {c.length != null && (
                  <>
                    <span style={{fontSize:"1.1rem",fontWeight:"700",color:"#7a9ab4"}}>{c.length}</span>
                    <span style={{fontSize:"0.6rem",color:"#3a5060"}}> cm</span>
                  </>
                )}
              </div>
              {/* Photo */}
              <div style={{
                width:"44px", height:"44px", borderRadius:"3px",
                background:"#0a1525", border:"1px solid #1a2840",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:"1.2rem", color:"#1a3050",
              }}>
                {c.photo ? <img src={c.photo} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"3px"}} /> : "🐟"}
              </div>
            </div>
          ))
        }
      </div>

      {/* Export / clear */}
      {catches.length > 0 && (
        <div style={{display:"flex",gap:"8px",flexShrink:0,paddingBottom:"8px",paddingTop:"6px"}}>
          <button onClick={exportCSV} style={{flex:1,padding:"8px",borderRadius:"3px",border:"1px solid #1a3050",background:"#0a1020",color:"#3a6080",fontSize:"0.65rem",fontWeight:"700",letterSpacing:"0.08em",textTransform:"uppercase"}}>
            Export CSV
          </button>
          <button onClick={clearTrip} style={{flex:1,padding:"8px",borderRadius:"3px",border:"1px solid #3a1a1a",background:"#0a1020",color:"#6a3030",fontSize:"0.65rem",fontWeight:"700",letterSpacing:"0.08em",textTransform:"uppercase"}}>
            Clear Trip
          </button>
        </div>
      )}

      {/* Bottom buttons — same as dashboard */}
      <div style={{display:"flex",gap:"10px",flexShrink:0,paddingBottom:"4px"}}>
        <button onClick={toggleTrip} style={{
          flex:1, padding:"14px 8px", borderRadius:"4px", border:"none",
          background: tripActive?"#141408":"#0a1020",
          cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"8px",
        }}>
          <div style={{fontSize:"0.6rem",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:tripActive?"#8a7040":"#2a4060"}}>Trip Log</div>
          <div style={{width:"80px",height:"40px",borderRadius:"20px",background:tripActive?"#2a1e04":"#0d1828",border:`2px solid ${tripActive?"#e8a020":"#1e3a50"}`,display:"flex",alignItems:"center",justifyContent:tripActive?"flex-end":"flex-start",padding:"4px",transition:"all 0.2s"}}>
            <div style={{width:"30px",height:"30px",borderRadius:"50%",background:tripActive?"#e8a020":"#1a3050",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
              <span style={{fontSize:"0.5rem",fontWeight:"700",color:tripActive?"#080600":"#3a5a7a"}}>{tripActive?"ON":"OFF"}</span>
            </div>
          </div>
          <div style={{fontSize:"0.7rem",color:tripActive?"#c8a060":"#1a3050",minHeight:"1.1em"}}>{tripActive?fmtElapsed(tripElapsed):""}</div>
        </button>
        <button onClick={openCamera} style={{
          flex:1, padding:"14px 8px", borderRadius:"4px", border:"none", background:"#0a1020",
          cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"8px",
        }}>
          <div style={{fontSize:"0.6rem",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:"#2a4060"}}>Fish ID</div>
          <div style={{fontSize:"3rem",lineHeight:1}}>📷</div>
          <div style={{minHeight:"1.1em"}} />
        </button>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",gap:"8px",position:"relative",overflow:"hidden"}}>

      {/* Hidden camera input */}
      <input ref={fileInputRef} type="file" accept="image/*"
        onChange={handlePhoto}
        style={{display:"none"}} />

      {/* Fish ID modal overlay */}
      {idState && (
        <div style={{
          position:"absolute", inset:0, zIndex:20,
          background:"rgba(6,12,24,0.97)",
          display:"flex", flexDirection:"column",
          padding:"20px 16px",
          justifyContent:"center",
        }}>
          {idState === "confirm" && (
            <div>
              {idPhoto && <img src={`data:image/jpeg;base64,${idPhoto}`} style={{width:"100%",maxHeight:"35vh",objectFit:"contain",borderRadius:"4px",marginBottom:"16px"}} />}
              <div style={{fontSize:"0.57rem",color:"#2a4a6a",textTransform:"uppercase",letterSpacing:"0.13em",marginBottom:"12px"}}>Fish ID — confirm or edit</div>

              <div style={{marginBottom:"12px"}}>
                <div style={{fontSize:"0.57rem",color:"#3a5568",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"5px"}}>Species</div>
                <select value={idSpecies} onChange={e=>setIdSpecies(e.target.value)}
                  style={{width:"100%",background:"#0d1828",border:"1px solid #1a3050",borderRadius:"3px",padding:"8px 10px",color:"#d4dce8",fontSize:"1rem",fontFamily:"inherit",fontWeight:"700",marginBottom:"6px"}}>
                  <option value="">— select species —</option>
                  <option value="Flathead">Flathead</option>
                  <option value="Bream">Bream</option>
                  <option value="Snapper">Snapper</option>
                  <option value="Kingfish">Kingfish</option>
                  <option value="Tailor">Tailor</option>
                  <option value="Salmon">Salmon</option>
                  <option value="Mulloway">Mulloway</option>
                  <option value="Unknown">Unknown</option>
                </select>
                <input value={idSpecies} onChange={e=>setIdSpecies(e.target.value)}
                  placeholder="or type species"
                  style={{width:"100%",background:"#0d1828",border:"1px solid #1a2840",borderRadius:"3px",padding:"6px 10px",color:"#8090a4",fontSize:"0.85rem",fontFamily:"inherit"}} />
              </div>

              <div style={{marginBottom:"6px"}}>
                <div style={{fontSize:"0.57rem",color:"#3a5568",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"5px"}}>Length (cm)</div>
                <select value={idLength} onChange={e=>setIdLength(e.target.value)}
                  style={{width:"100%",background:"#0d1828",border:"1px solid #1a3050",borderRadius:"3px",padding:"8px 10px",color:"#d4dce8",fontSize:"1rem",fontFamily:"inherit",fontWeight:"700",marginBottom:"6px"}}>
                  <option value="">— select length —</option>
                <option value="20">20 cm</option>
                <option value="21">21 cm</option>
                <option value="22">22 cm</option>
                <option value="23">23 cm</option>
                <option value="24">24 cm</option>
                <option value="25">25 cm</option>
                <option value="26">26 cm</option>
                <option value="27">27 cm</option>
                <option value="28">28 cm</option>
                <option value="29">29 cm</option>
                <option value="30">30 cm</option>
                <option value="31">31 cm</option>
                <option value="32">32 cm</option>
                <option value="33">33 cm</option>
                <option value="34">34 cm</option>
                <option value="35">35 cm</option>
                <option value="36">36 cm</option>
                <option value="37">37 cm</option>
                <option value="38">38 cm</option>
                <option value="39">39 cm</option>
                <option value="40">40 cm</option>
                <option value="41">41 cm</option>
                <option value="42">42 cm</option>
                <option value="43">43 cm</option>
                <option value="44">44 cm</option>
                <option value="45">45 cm</option>
                <option value="46">46 cm</option>
                <option value="47">47 cm</option>
                <option value="48">48 cm</option>
                <option value="49">49 cm</option>
                <option value="50">50 cm</option>
                <option value="51">51 cm</option>
                <option value="52">52 cm</option>
                <option value="53">53 cm</option>
                <option value="54">54 cm</option>
                <option value="55">55 cm</option>
                <option value="56">56 cm</option>
                <option value="57">57 cm</option>
                <option value="58">58 cm</option>
                <option value="59">59 cm</option>
                <option value="60">60 cm</option>
                <option value="61">61 cm</option>
                <option value="62">62 cm</option>
                <option value="63">63 cm</option>
                <option value="64">64 cm</option>
                <option value="65">65 cm</option>
                <option value="66">66 cm</option>
                <option value="67">67 cm</option>
                <option value="68">68 cm</option>
                <option value="69">69 cm</option>
                <option value="70">70 cm</option>
                <option value="71">71 cm</option>
                <option value="72">72 cm</option>
                <option value="73">73 cm</option>
                <option value="74">74 cm</option>
                <option value="75">75 cm</option>
                <option value="76">76 cm</option>
                <option value="77">77 cm</option>
                <option value="78">78 cm</option>
                <option value="79">79 cm</option>
                <option value="80">80 cm</option>
                </select>
                <input value={idLength} onChange={e=>setIdLength(e.target.value)}
                  type="number" placeholder="or type cm"
                  style={{width:"100%",background:"#0d1828",border:"1px solid #1a2840",borderRadius:"3px",padding:"6px 10px",color:"#8090a4",fontSize:"0.85rem",fontFamily:"inherit"}} />
              </div>


              <div style={{display:"flex",gap:"10px",marginTop:"8px"}}>
                <button onClick={cancelID} style={{flex:1,padding:"10px",borderRadius:"3px",border:"1px solid #1a3050",background:"#0a1020",color:"#3a5a7a",fontSize:"0.7rem",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em"}}>Cancel</button>
                <button onClick={confirmCatch} style={{flex:2,padding:"10px",borderRadius:"3px",border:"1px solid #e8a020",background:"#1a1a08",color:"#e8a020",fontSize:"0.7rem",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em"}}>Log Catch</button>
              </div>
            </div>
          )}

        </div>
      )}

      <TripPanel />

      {/* Header */}
      <div style={{flexShrink:0,paddingTop:"12px",paddingBottom:"14px"}}>
        <div style={{fontSize:"0.53rem",color:"#1a3050",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:"10px"}}>◈ Weekend Fishing</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:"16px"}}>
            {Object.entries(LOCATIONS).map(([key, l]) => (
              <button key={key} onClick={()=>setLocKey(key)} style={{
                background:"none",border:"none",padding:0,
                fontSize:"1.35rem",fontWeight:"700",letterSpacing:"-0.03em",lineHeight:1,
                color: locKey===key ? "#e8a020" : "#243040",
                transition:"color 0.15s",
              }}>{l.short}</button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
            {tripActive && (
              <button onClick={()=>setShowTrip(true)} style={{
                background:"none",border:"none",padding:0,
                fontSize:"0.6rem",fontWeight:"700",letterSpacing:"0.1em",textTransform:"uppercase",
                color:"#e8a020",cursor:"pointer",
              }}>Trip Log →</button>
            )}
            <div style={{fontSize:"0.53rem",color:"#1a3050"}}>
              {loading?"Fetching…":updatedAt?`Updated ${updatedAt}`:"—"}
            </div>
          </div>
        </div>
      </div>

      {/* Day navigator */}
      <div style={{display:"flex",gap:"6px",alignItems:"center",flexShrink:0}}>
        <button onClick={()=>setWindowStart(d=>addDays(d,-1))} style={{
          ...btnBase,flex:"0 0 32px",borderColor:"#1a2840",background:"#0a1020",color:"#3a6080",fontSize:"1.1rem",
        }}>‹</button>
        {[dayA,dayB].map((d,i) => (
          <button key={i} onClick={()=>setActiveIdx(i)} style={{
            ...btnBase,flex:1,
            borderColor: activeIdx===i?"#e8a020":"#1a2840",
            background:  activeIdx===i?"#1a2a10":"#0a1020",
            color:       activeIdx===i?"#e8a020":"#3a5a7a",
          }}>
            {d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})}
          </button>
        ))}
        <button onClick={()=>setWindowStart(d=>addDays(d,1))} style={{
          ...btnBase,flex:"0 0 32px",borderColor:"#1a2840",background:"#0a1020",color:"#3a6080",fontSize:"1.1rem",
        }}>›</button>
      </div>

      {/* Card */}
      <div style={{flex:1,minHeight:0}}>
        <DayCard
          date={date} loc={loc}
          weather={weather[locKey]}     weatherError={weatherError[locKey]}
          marine={marine[locKey]}       marineError={marineError[locKey]}
          tidesLoading={tidesLoading}
          tides={tideData[cacheKey]}
          tidesError={tideErrors[cacheKey]}
        />
      </div>

      {/* Bottom action buttons */}
      <div style={{display:"flex",gap:"10px",flexShrink:0,paddingBottom:"4px"}}>
        <button onClick={toggleTrip} style={{
          flex:1, padding:"14px 8px", borderRadius:"4px", border:"none",
          background: tripActive?"#141408":"#0a1020",
          cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"8px",
        }}>
          <div style={{fontSize:"0.6rem",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:tripActive?"#8a7040":"#2a4060"}}>Trip Log</div>
          <div style={{width:"80px",height:"40px",borderRadius:"20px",background:tripActive?"#2a1e04":"#0d1828",border:`2px solid ${tripActive?"#e8a020":"#1e3a50"}`,display:"flex",alignItems:"center",justifyContent:tripActive?"flex-end":"flex-start",padding:"4px",transition:"all 0.2s"}}>
            <div style={{width:"30px",height:"30px",borderRadius:"50%",background:tripActive?"#e8a020":"#1a3050",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
              <span style={{fontSize:"0.5rem",fontWeight:"700",color:tripActive?"#080600":"#3a5a7a"}}>{tripActive?"ON":"OFF"}</span>
            </div>
          </div>
          <div style={{fontSize:"0.7rem",color:tripActive?"#c8a060":"#1a3050",minHeight:"1.1em"}}>{tripActive?fmtElapsed(tripElapsed):""}</div>
        </button>
        <button onClick={openCamera} style={{
          flex:1, padding:"14px 8px", borderRadius:"4px", border:"none",
          background:"#0a1020",
          cursor: "pointer",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"8px",
        }}>
          <div style={{fontSize:"0.6rem",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:"#2a4060"}}>Fish ID</div>
          <div style={{fontSize:"3rem",lineHeight:1}}>📷</div>
          <div style={{minHeight:"1.1em"}} />
        </button>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
